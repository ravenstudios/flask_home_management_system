{% extends 'base-template.html' %}
{% block content %}
<div id="content">

  <form class="" action="change-password" method="post" enctype="multipart/form-data">
    {% if user %}<input name="id" type="hidden" value="{{ user.id}}">{% endif %}

    <label for="current-password">Current Password</label>
      <input type="password" name="current-password">

    <label for="new-password">New Password</label>
      <input type="password" name="new-password">

    <label for="confirm-password">Confirm Password</label>
      <input type="password" name="confirm-password">


    <input type="submit" value="Submit">
  </form>
</div>

<script type="text/javascript">

  document.querySelector("form").addEventListener("submit", function (e) {
    const current = document.querySelector('[name="current-password"]').value;
    const newPass = document.querySelector('[name="new-password"]').value;
    const confirm = document.querySelector('[name="confirm-password"]').value;

    // Check new passwords match
    if (newPass !== confirm) {
      alert("New passwords do not match");
      e.preventDefault();
      return;
    }

    // Optional: prevent empty password
    if (newPass.length < 4) {
      alert("Password must be at least 4 characters");
      e.preventDefault();
      return;
    }

    // NOTE: we CANNOT verify current password in JS securely
    // That must be done in Flask
  });
</script>

<script type="text/javascript" src="/static/scripts/confirmDelete.js"></script>


{% endblock %}
